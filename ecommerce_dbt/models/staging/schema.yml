version: 2

models:
  - name: stg_orders
    description: "Cleaned orders from raw, one row per order"
    columns:
      - name: order_id
        description: "Unique order identifier"
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ['Complete', 'Shipped', 'Processing', 'Cancelled', 'Returned']
